{% extends 'base.html' %}

{% block content %}

<div class="page-header">
    <h1>Add Medicine</h1>
    <p>Add new medicine stock to inventory</p>
</div>

<div class="form-card">

    <form method="POST">

        <div class="form-group">
            <label>Medicine Name</label>
            <input type="text"
                   name="name"
                   class="form-control"
                   required>
        </div>

        <div class="form-group">
            <label>Manufacturer</label>
            <input type="text"
                   name="manufacturer"
                   class="form-control"
                   required>
        </div>

        <div class="form-group">
            <label>Quantity</label>
            <input type="number"
                   name="quantity"
                   class="form-control"
                   required>
        </div>

        <div class="form-group">
            <label>Expiry Date</label>
            <input type="date"
                   name="expiry_date"
                   class="form-control"
                   required>
        </div>

        <button type="submit" class="save-btn">
            Save Medicine
        </button>

    </form>

</div>

{% endblock %}
